name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test
      - name: Determine npm tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if echo "$VERSION" | grep -q "alpha"; then
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -q "beta"; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish packages
        run: |
          TAG="${{ steps.tag.outputs.npm_tag }}"
          for pkg in packages/core packages/discord packages/cli; do
            echo "Publishing $pkg..."
            cd "$GITHUB_WORKSPACE/$pkg"
            NODE_AUTH_TOKEN="" npm publish --tag "$TAG" --access public --provenance
          done
