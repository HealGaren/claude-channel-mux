name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # OIDC trusted publishing planned, keeping id-token for future use
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test
      - name: Determine npm tag
        id: tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if echo "$VERSION" | grep -q "alpha"; then
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          elif echo "$VERSION" | grep -q "beta"; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.npm_tag }}"
          for pkg in packages/core packages/discord packages/cli; do
            echo "Publishing $pkg..."
            cd "$GITHUB_WORKSPACE/$pkg"
            pnpm publish --tag "$TAG" --access public --no-git-checks
          done
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE="${{ steps.tag.outputs.prerelease }}"
          FLAGS=""
          if [ "$PRERELEASE" = "true" ]; then
            FLAGS="--prerelease"
          fi
          # Extract current version section from CHANGELOG.md
          VERSION="${TAG#v}"
          NOTES=$(sed -n "/^# ${VERSION}/,/^# [0-9]/p" CHANGELOG.md | sed '1d;$d')
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" $FLAGS
